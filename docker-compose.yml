services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-appdb}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-appuser}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-StrongPass123!}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q '^Ok\\.$'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  clickhouse_data:
